services:
  app:
    image: python:3.12-slim
    container_name: frameworks-django-postgresql
    working_dir: /workspace
    command: sh -c "pip install -r requirements.txt && python manage.py migrate && python manage.py runserver 0.0.0.0:8003"
    ports:
      - "${APP_PORT:-8003}:8003"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-campus_db}
      POSTGRES_USER: ${POSTGRES_USER:-campus_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-campus_pass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-campus_db}
      MYSQL_USER: ${MYSQL_USER:-campus_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-campus_pass}
    volumes:
      - ./:/workspace
    depends_on:
      - postgres
    restart: unless-stopped
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-campus_db}
      POSTGRES_USER: ${POSTGRES_USER:-campus_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-campus_pass}
    ports:
      - "${POSTGRES_PORT:-5453}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped
  adminer:
    image: adminer:4
    depends_on:
      - postgres
    ports:
      - "${ADMINER_PORT:-8094}:8080"
    restart: unless-stopped

volumes:
  db-data:
