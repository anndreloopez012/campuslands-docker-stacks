services:
  app:
    image: node:22-alpine
    container_name: frameworks-nestjs-postgresql
    working_dir: /workspace
    command: sh -c "npm install && npm run start:dev"
    ports:
      - "${APP_PORT:-3331}:3331"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-campus_db}
      POSTGRES_USER: ${POSTGRES_USER:-campus_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-campus_pass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-campus_db}
      MYSQL_USER: ${MYSQL_USER:-campus_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-campus_pass}
    volumes:
      - ./:/workspace
    depends_on:
      - postgres
    restart: unless-stopped
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-campus_db}
      POSTGRES_USER: ${POSTGRES_USER:-campus_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-campus_pass}
    ports:
      - "${POSTGRES_PORT:-5451}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped
  adminer:
    image: adminer:4
    depends_on:
      - postgres
    ports:
      - "${ADMINER_PORT:-8092}:8080"
    restart: unless-stopped

volumes:
  db-data:
