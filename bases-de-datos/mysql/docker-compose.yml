services:
  app:
    image: mysql:8.4
    container_name: bases-de-datos-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-campus_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-campus_db}
      MYSQL_USER: ${MYSQL_USER:-campus_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-campus_pass}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped

volumes:
  mysql-data:
