services:
  app:
    image: mongo:7
    container_name: bases-de-datos-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-campus_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-campus_pass}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-campus_db}
    ports:
      - "${MONGO_PORT:-27018}:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

volumes:
  mongo-data:
