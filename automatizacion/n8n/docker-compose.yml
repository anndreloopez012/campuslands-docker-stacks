services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-n8n_local}
    ports:
      - "${POSTGRES_PORT:-5440}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6381}:6379"
    restart: unless-stopped
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "${MAILPIT_PORT:-8026}:8025"
    restart: unless-stopped
  n8n:
    image: n8nio/n8n:latest
    depends_on:
      - postgres
      - redis
      - mailpit
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-n8n_local}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-campuslands_local_key_change_me}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-campus}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-campus123}
      QUEUE_BULL_REDIS_HOST: redis
      EXECUTIONS_MODE: queue
      N8N_EMAIL_MODE: smtp
      N8N_SMTP_HOST: mailpit
      N8N_SMTP_PORT: 1025
    volumes:
      - n8n-data:/home/node/.n8n
    restart: unless-stopped
  n8n-worker:
    image: n8nio/n8n:latest
    depends_on:
      - n8n
    command: worker
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-n8n_local}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-campuslands_local_key_change_me}
      QUEUE_BULL_REDIS_HOST: redis
      EXECUTIONS_MODE: queue
    restart: unless-stopped

volumes:
  postgres-data:
  n8n-data:
