services:
  app:
    image: node:22-alpine
    container_name: campus-react-vite
    working_dir: /workspace
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "${APP_PORT:-5173}:5173"
    volumes:
      - ./:/workspace
      - node-modules:/workspace/node_modules
    restart: unless-stopped

volumes:
  node-modules:
