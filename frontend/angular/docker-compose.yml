services:
  app:
    image: node:22-alpine
    container_name: campus-angular
    working_dir: /workspace
    command: sh -c "npm install && npm run start -- --host 0.0.0.0 --port 4200"
    ports:
      - "${APP_PORT:-4200}:4200"
    volumes:
      - ./:/workspace
      - node-modules:/workspace/node_modules
    restart: unless-stopped

volumes:
  node-modules:
