services:
  db:
    image: supabase/postgres:15.1.1.78
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-campus_supabase_pass}
      POSTGRES_DB: postgres
    ports:
      - "${DB_PORT:-54322}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped
  studio:
    image: supabase/studio:latest
    depends_on:
      - db
    ports:
      - "${STUDIO_PORT:-54323}:3000"
    environment:
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: http://localhost:${KONG_HTTP_PORT:-54321}
      SUPABASE_ANON_KEY: ${ANON_KEY:-campus_anon_key_local}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY:-campus_service_role_key_local}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-campus_supabase_pass}
    restart: unless-stopped
  kong:
    image: kong:2.8.1
    ports:
      - "${KONG_HTTP_PORT:-54321}:8000"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl
    volumes:
      - ./volumes/kong/kong.yml:/home/kong/kong.yml:ro
    restart: unless-stopped
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "${MAILPIT_PORT:-8027}:8025"
    restart: unless-stopped
volumes:
  db-data:
